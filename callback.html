<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The CamCode - 인증 완료</title>
  <style>
    /* 기존 스타일 그대로 유지 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0D1117;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card { text-align: center; padding: 40px 32px; }
    .icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #00C896, #0066FF);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    .title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .desc { font-size: 14px; color: rgba(255,255,255,0.4); line-height: 1.6; }
    .btn {
      margin-top: 24px;
      display: inline-block;
      background: linear-gradient(135deg, #00C896, #0066FF);
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 14px;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    .error { color: #FF4D4D; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">⏳</div>
    <div class="title" id="title">인증 처리 중...</div>
    <div class="desc" id="desc">The CamCode 앱으로 연결 중입니다.</div>
    <button class="btn" id="btn" style="display:none" onclick="openApp()">앱으로 돌아가기</button>
  </div>

  <script>
    // ── 여기를 CamCode용으로 수정했습니다! ──────────────────────
    const DEEP_LINK_SCHEME = 'camcode://callback'; 

    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    const error  = params.get('error');

    const iconEl  = document.getElementById('icon');
    const titleEl = document.getElementById('title');
    const descEl  = document.getElementById('desc');
    const btnEl   = document.getElementById('btn');

    function openApp() {
      if (code) {
        window.location.href = DEEP_LINK_SCHEME + '?code=' + encodeURIComponent(code);
      }
    }

    if (error) {
      iconEl.textContent  = '❌';
      titleEl.textContent = '인증 실패';
      descEl.textContent  = '다시 시도해주세요.\n' + error;
      descEl.classList.add('error');
    } else if (code) {
      iconEl.textContent  = '✅';
      titleEl.textContent = '인증 완료';
      descEl.textContent  = 'The CamCode 앱으로 자동 전환됩니다...';

      setTimeout(() => {
        openApp();
        setTimeout(() => {
          descEl.textContent = '자동 전환이 안되면 아래 버튼을 눌러주세요.';
          btnEl.style.display = 'inline-block';
        }, 2000);
      }, 500);
    } else {
      iconEl.textContent  = '❓';
      titleEl.textContent = '코드 없음';
      descEl.textContent  = '인증 코드를 찾을 수 없습니다.';
    }
  </script>
</body>
</html>
